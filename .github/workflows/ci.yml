name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # The unit suite is pure-Python: the ML paths (whisperX/pyannote/sherpa-onnx)
      # are `# pragma: no cover` and never imported by tests. numpy lets the
      # serialization/confidence regression tests exercise real numpy scalars.
      - run: python -m pip install --upgrade pip pytest numpy
      - run: python -m pytest tests/ -v
